<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jaisel's Profile{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        // Check local storage, default to dark mode ALWAYS
        const savedTheme = localStorage.getItem('theme');
        
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <header>
        <a href="/" class="nav-brand">Jaisel's Hub</a>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/blessed-bees">Blessed Bees</a>
            <div class="theme-switch-wrapper" style="margin-left: 0.5rem; gap: 0.5rem;">
                <span style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Dark Mode</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; 2026 Jaisel | Built with FastAPI
    </footer>

    <script>
        const themeToggle = document.getElementById('checkbox');
        const htmlElement = document.documentElement;
        
        // Initial setup
        if (htmlElement.getAttribute('data-theme') === 'dark') {
            themeToggle.checked = true;
        } else {
            themeToggle.checked = false;
        }
        
        // Handle click
        themeToggle.addEventListener('change', (e) => {
            const newTheme = e.target.checked ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
