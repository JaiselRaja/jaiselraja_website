version: '3.8'

services:
  web:
    build: .
    restart: always
    volumes:
      - ./notes.db:/app/notes.db
      - ./static/uploads:/app/static/uploads
    expose:
      - "8000"

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
